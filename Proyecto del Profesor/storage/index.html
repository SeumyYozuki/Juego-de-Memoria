<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD LocalStorage JSON</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <div class="container">
        <h2>Mi Lista de Tareas (CRUD JSON)</h2>
        
        <!-- Formulario para Crear / Editar -->
        <form id="todo-form">
            <input type="hidden" id="task-id">
            <input type="text" id="task-title" placeholder="¿Qué tienes que hacer?" required>
            <button type="submit" id="form-btn">Agregar Tarea</button>
            <button type="button" id="cancel-btn" class="hidden">Cancelar</button>
        </form>

        <!-- Contenedor donde se listarán las tareas -->
        <ul id="task-list"></ul>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
